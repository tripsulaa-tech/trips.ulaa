<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF7F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F2EBE0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D98A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A85A2A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)" rx="16"/>

  <!-- Sun arc (top center) -->
  <path d="M 160 120 A 40 40 0 0 1 240 120" fill="none" stroke="url(#sunGrad)" stroke-width="8" stroke-linecap="round"/>
  <!-- Sun rays -->
  <line x1="200" y1="68" x2="200" y2="78" stroke="#D98A3A" stroke-width="4" stroke-linecap="round"/>
  <line x1="220" y1="72" x2="217" y2="81" stroke="#D98A3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="72" x2="183" y2="81" stroke="#D98A3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="238" y1="82" x2="232" y2="88" stroke="#D98A3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="162" y1="82" x2="168" y2="88" stroke="#D98A3A" stroke-width="3" stroke-linecap="round"/>

  <!-- Landscape base line -->
  <path d="M 60 170 Q 120 155 180 168 Q 220 175 260 160 Q 300 148 340 162 L 340 200 L 60 200 Z" fill="#C4703A" opacity="0.15"/>

  <!-- Palm tree (left) -->
  <line x1="95" y1="170" x2="100" y2="130" stroke="#2D2118" stroke-width="3" stroke-linecap="round"/>
  <path d="M 100 132 Q 88 120 80 112" fill="none" stroke="#A85A2A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 100 132 Q 112 118 118 108" fill="none" stroke="#A85A2A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 100 135 Q 90 128 84 122" fill="none" stroke="#A85A2A" stroke-width="2" stroke-linecap="round"/>
  <path d="M 100 135 Q 110 128 116 122" fill="none" stroke="#A85A2A" stroke-width="2" stroke-linecap="round"/>

  <!-- Mountains (right) -->
  <path d="M 265 170 L 295 130 L 325 170 Z" fill="#2D2118" opacity="0.6"/>
  <path d="M 285 170 L 308 142 L 330 170 Z" fill="#4A3728" opacity="0.5"/>

  <!-- Wavy ground lines -->
  <path d="M 60 178 Q 120 172 180 178 Q 240 184 300 178 Q 320 175 340 178" fill="none" stroke="#A85A2A" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M 60 186 Q 130 180 200 186 Q 270 192 340 186" fill="none" stroke="#A85A2A" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

  <!-- Birds (silhouettes) -->
  <path d="M 150 108 Q 155 104 160 108" fill="none" stroke="#2D2118" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 232 100 Q 237 96 242 100" fill="none" stroke="#2D2118" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 260 112 Q 264 109 268 112" fill="none" stroke="#2D2118" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ULAA Main Text -->
  <text x="200" y="228" font-family="Georgia, serif" font-size="54" font-weight="bold" fill="#2D2118" text-anchor="middle" letter-spacing="8">ULAA</text>

  <!-- Tamil subtitle: உலா -->
  <text x="200" y="252" font-family="Georgia, serif" font-size="16" fill="#A85A2A" text-anchor="middle" letter-spacing="3">உலா</text>

  <!-- Tagline -->
  <text x="200" y="272" font-family="Arial, sans-serif" font-size="8" fill="#4A3728" text-anchor="middle" letter-spacing="2.5" opacity="0.8">UNSEEN · LOCAL · ADVENTURES · ACTIVITIES</text>

  <!-- Decorative dots -->
  <circle cx="75" cy="265" r="2" fill="#A85A2A" opacity="0.5"/>
  <circle cx="325" cy="265" r="2" fill="#A85A2A" opacity="0.5"/>
  <line x1="82" y1="265" x2="140" y2="265" stroke="#A85A2A" stroke-width="0.8" opacity="0.3"/>
  <line x1="260" y1="265" x2="318" y2="265" stroke="#A85A2A" stroke-width="0.8" opacity="0.3"/>
</svg>
